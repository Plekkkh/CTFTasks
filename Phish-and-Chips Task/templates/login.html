{% extends "base.html" %}
{% block title %}Customer Portal | PhishGuard{% endblock %}

{% block content %}
<div class="container mt-5 pt-5">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card-custom p-5">
                <div class="text-center mb-4">
                    <h3 class="fw-bold">Customer Portal</h3>
                    <p class="text-muted-custom small">Sign in to your enterprise dashboard</p>
                </div>

                {% if error %}
                <div class="alert alert-danger-custom small">{{ error }}</div>
                {% endif %}

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label text-muted-custom small">Username</label>
                        <input type="text" name="username" class="form-control form-custom">
                    </div>
                    <div class="mb-4">
                        <label class="form-label d-flex justify-content-between text-muted-custom small">
                            Password
                            <a href="#" class="text-decoration-none text-accent">Forgot?</a>
                        </label>
                        <input type="password" name="password" class="form-control form-custom">
                    </div>
                    <button type="submit" class="btn btn-brand w-100 py-2">Secure Login</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
