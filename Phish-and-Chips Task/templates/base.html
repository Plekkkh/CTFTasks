<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PhishGuard Enterprise{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand brand-logo" href="/">PhishGuard</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a class="nav-link px-3" href="/">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3" href="/docs">API Docs</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3" href="/login">Customer Portal</a>
                    </li>
                    <li class="nav-item ms-3">
                        <a class="btn btn-brand btn-sm px-4 py-2" href="/demo">Live Demo</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <div class="footer">
        <div class="container">
            <div class="mb-2">
                <span>SOC2 Type II Certified</span> &nbsp;|&nbsp;
                <span>ISO 27001 Compliant</span> &nbsp;|&nbsp;
                <span>GDPR Ready</span>
            </div>
            &copy; 2026 PhishGuard Enterprise Security Solutions. All rights reserved.
        </div>
    </div>
</body>
</html>
