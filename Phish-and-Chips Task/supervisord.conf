[supervisord]
nodaemon=true
user=root

[program:cron]
command=cron -f
autostart=true
autorestart=true

[program:external_app]
command=gunicorn -w 4 -b 0.0.0.0:8080 external_app:app
directory=/app
user=www-data
autostart=true
autorestart=true

[program:internal_app]
command=gunicorn -w 4 -b 127.0.0.1:5000 internal_app:app
directory=/app
user=www-data
autostart=true
autorestart=true